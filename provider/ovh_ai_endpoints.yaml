provider: ovh_ai_endpoints
author: rungeard
label:
  en_US: OVH AI Endpoints
description:
  en_US: OVH AI Endpoints models exposed through OpenAI-compatible APIs.
icon_small:
  en_US: icon.svg
icon_large:
  en_US: icon.svg
help:
  title:
    en_US: Get your API key from OVH AI Endpoints
  url:
    en_US: https://www.ovhcloud.com/en/public-cloud/ai-endpoints/
background: "#0050D7"
supported_model_types:
  - llm
  - moderation
  - text-embedding
  - speech2text
  - tts
configurate_methods:
  - predefined-model
provider_credential_schema:
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: OVH AI Endpoints API key
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - "models/llm/*.yaml"
  moderation:
    position: models/moderation/_position.yaml
    predefined:
      - "models/moderation/*.yaml"
  text_embedding:
    predefined:
      - "models/text_embedding/*.yaml"
  speech2text:
    predefined:
      - "models/speech2text/*.yaml"
  tts:
    predefined:
      - "models/tts/*.yaml"
extra:
  python:
    provider_source: provider/ovh_ai_endpoints.py
    model_sources:
      - "models/llm/llm.py"
      - "models/moderation/moderation.py"
      - "models/text_embedding/text_embedding.py"
      - "models/speech2text/speech2text.py"
      - "models/tts/tts.py"
