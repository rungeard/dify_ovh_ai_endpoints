model: Qwen3-32B
label:
  en_US: Qwen3-32B
model_type: llm
features:
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - agent-thought
model_properties:
  mode: chat
  context_size: 32768
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      en_US: Reasoning effort
    type: string
    required: false
    options:
      - low
      - medium
      - high
pricing:
  input: "0.08"
  output: "0.23"
  unit: "0.000001"
  currency: EUR
