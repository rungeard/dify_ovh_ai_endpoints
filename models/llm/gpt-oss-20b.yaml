model: gpt-oss-20b
label:
  en_US: gpt-oss-20b
model_type: llm
features:
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - agent-thought
model_properties:
  mode: chat
  context_size: 131072
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 32768
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      en_US: Reasoning effort
    type: string
    required: false
    options:
      - low
      - medium
      - high
  - name: exclude_reasoning_tokens
    label:
      en_US: Hide reasoning content
    type: boolean
    required: false
    default: false
pricing:
  input: "0.04"
  output: "0.15"
  unit: "0.000001"
  currency: EUR
